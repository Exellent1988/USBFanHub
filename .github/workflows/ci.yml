name: CI

on:
  push:
    branches: [ main, develop, 'cursor/**' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  firmware:
    name: Firmware Build
    uses: ./.github/workflows/firmware-build.yml
  
  python:
    name: Python Tests
    uses: ./.github/workflows/python-tests.yml
  
  status-check:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [firmware, python]
    if: always()
    
    steps:
    - name: Check CI Results
      run: |
        if [ "${{ needs.firmware.result }}" != "success" ]; then
          echo "❌ Firmware build failed"
          exit 1
        fi
        if [ "${{ needs.python.result }}" != "success" ]; then
          echo "❌ Python tests failed"
          exit 1
        fi
        echo "✅ All CI checks passed!"
    
    - name: Generate CI Summary
      if: always()
      run: |
        echo "## CI Status Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ needs.firmware.result }}" == "success" ]; then
          echo "| Firmware Build | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Firmware Build | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ needs.python.result }}" == "success" ]; then
          echo "| Python Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
        else
          echo "| Python Tests | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
        fi
